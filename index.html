<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Révision - Classe</title>
    <style>
        :root {
            --primary: #2d6a4f;
            --bg: #f8f9fa;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--bg); }
        
        /* Navigation */
        nav { background: var(--primary); display: flex; justify-content: space-around; padding: 15px; position: sticky; top: 0; }
        nav button { background: none; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        nav button:hover { text-decoration: underline; }

        /* Contenu */
        .container { padding: 20px; max-width: 800px; margin: auto; }
        .section { display: none; }
        .section.active { display: block; }
        
        /* Cartes Quiz */
        .quiz-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .hidden { display: none; }
        
        input[type="text"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn-check { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<nav>
    <button onclick="showSection('fiches')">Fiches</button>
    <button onclick="showSection('videos')">Vidéos</button>
    <button onclick="showSection('quizz')">Quizz</button>
</nav>

<div class="container">
    
    <section id="fiches" class="section">
        <h2>Mes fiches de révision</h2>
        <p>Contenu des fiches à venir...</p>
    </section>

    <section id="videos" class="section">
        <h2>Vidéos de cours</h2>
        <p>Lien vers les vidéos Youtube ou PeerTube...</p>
    </section>

    <section id="quizz" class="section active">
        <h2>Espace Quizz</h2>
        
        <div id="auth-area" class="quiz-card">
            <h3>Identifie-toi</h3>
            <p>Entre ton prénom ou ton pseudonyme :</p>
            <input type="text" id="student-name" placeholder="Ex: Jules ou Eleve_A1">
            <button class="btn-check" onclick="startQuiz()">Accéder aux questions</button>
        </div>

        <div id="quiz-area" class="quiz-card hidden">
            <h3 id="quiz-title">Quiz du jour</h3>
            <div id="questions">
                </div>
            <button class="btn-check" onclick="finishQuiz()">Terminer le quiz</button>
        </div>

        <div id="result-area" class="quiz-card hidden">
            <h3>Résultat</h3>
            <p id="score-text"></p>
            <p style="font-size: 0.8em; color: gray;">Note ce code sur ton cahier : <span id="validation-code"></span></p>
        </div>
    </section>

</div>

<script>
// --- CONFIGURATION ---
const listePseudos = ["Cobra-12", "Eclair-05", "Robot-22", "Lune-09"]; // Ajoutez vos pseudos ici
const lienForms = "https://forms.office.com/r/VOTRE_ID"; // Remplacez par votre lien Forms

// --- GESTION DES ONGLETS ---
function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// --- INITIALISATION ---
window.onload = function() {
    const select = document.createElement('select');
    select.id = "student-pseudo";
    select.innerHTML = '<option value="">-- Choisis ton pseudo --</option>' + 
        listePseudos.map(p => `<option value="${p}">${p}</option>`).join('');
    
    // On remplace l'input texte par la liste déroulante
    const authArea = document.getElementById('auth-area');
    authArea.innerHTML = '<h3>Identifie-toi</h3><p>Choisis ton pseudonyme :</p>';
    authArea.appendChild(select);
    authArea.innerHTML += '<br><br><button class="btn-check" onclick="startQuiz()">Accéder au Quiz</button>';
};

let currentStudent = "";
let scoreFinal = 0;

function startQuiz() {
    currentStudent = document.getElementById('student-pseudo').value;
    if(!currentStudent) {
        alert("Choisis ton pseudo !");
        return;
    }
    document.getElementById('auth-area').classList.add('hidden');
    document.getElementById('quiz-area').classList.remove('hidden');
    loadQuestions();
}

function loadQuestions() {
    const container = document.getElementById('questions');
    // Voici vos 3 questions
    const qData = [
        { q: "Question 1 : Quel est l'organe qui pompe le sang ?", a: ["Le foie", "Le cœur", "Le poumon"], correct: 1 },
        { q: "Question 2 : La photosynthèse rejette quel gaz ?", a: ["Azote", "CO2", "Oxygène"], correct: 2 },
        { q: "Question 3 : Quel est l'état de l'eau à 0°C ?", a: ["Liquide", "Solide", "Gazeux"], correct: 1 }
    ];

    container.innerHTML = qData.map((data, i) => `
        <div style="margin-bottom:15px; text-align:left;">
            <p><strong>${data.q}</strong></p>
            ${data.a.map((ans, idx) => `
                <label style="display:block; margin:5px 0;"><input type="radio" name="q${i}" value="${idx}"> ${ans}</label>
            `).join('')}
        </div>
    `).join('');
}

function finishQuiz() {
    let score = 0;
    const questions = [1, 2, 1]; // Index des bonnes réponses
    
    for(let i=0; i<3; i++) {
        let res = document.querySelector(`input[name="q${i}"]:checked`);
        if(res && parseInt(res.value) === questions[i]) score++;
    }

    scoreFinal = score;
    document.getElementById('quiz-area').classList.add('hidden');
    document.getElementById('result-area').classList.remove('hidden');
    
    // On affiche le résultat et un bouton pour envoyer vers Microsoft Forms
    document.getElementById('score-text').innerHTML = 
        `Bravo <strong>${currentStudent}</strong> !<br>Ton score est de <strong>${score} / 3</strong>`;
    
    // Bouton pour envoyer la note vers Forms
    const btnForms = document.createElement('button');
    btnForms.className = "btn-check";
    btnForms.style.marginTop = "20px";
    btnForms.innerText = "Enregistrer ma note sur le bureau du prof";
    btnForms.onclick = function() {
        // Cette URL ouvre le Forms avec le pseudo et le score (si configuré)
        window.open(lienForms); 
    };
    document.getElementById('result-area').appendChild(btnForms);
}
</script>

</body>
</html>
