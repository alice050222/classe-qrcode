<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Révision - Classe</title>
    <style>
        :root {
            --primary: #2d6a4f;
            --bg: #f8f9fa;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--bg); }
        
        /* Navigation */
        nav { background: var(--primary); display: flex; justify-content: space-around; padding: 15px; position: sticky; top: 0; }
        nav button { background: none; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        nav button:hover { text-decoration: underline; }

        /* Contenu */
        .container { padding: 20px; max-width: 800px; margin: auto; }
        .section { display: none; }
        .section.active { display: block; }
        
        /* Cartes Quiz */
        .quiz-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .hidden { display: none; }
        
        input[type="text"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn-check { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<nav>
    <button onclick="showSection('fiches')">Fiches</button>
    <button onclick="showSection('videos')">Vidéos</button>
    <button onclick="showSection('quizz')">Quizz</button>
</nav>

<div class="container">
    
    <section id="fiches" class="section">
        <h2>Mes fiches de révision</h2>
        <p>Contenu des fiches à venir...</p>
    </section>

    <section id="videos" class="section">
        <h2>Vidéos de cours</h2>
        <p>Lien vers les vidéos Youtube ou PeerTube...</p>
    </section>

    <section id="quizz" class="section active">
        <h2>Espace Quizz</h2>
        
        <div id="auth-area" class="quiz-card">
            <h3>Identifie-toi</h3>
            <p>Entre ton prénom ou ton pseudonyme :</p>
            <input type="text" id="student-name" placeholder="Ex: Jules ou Eleve_A1">
            <button class="btn-check" onclick="startQuiz()">Accéder aux questions</button>
        </div>

        <div id="quiz-area" class="quiz-card hidden">
            <h3 id="quiz-title">Quiz du jour</h3>
            <div id="questions">
                </div>
            <button class="btn-check" onclick="finishQuiz()">Terminer le quiz</button>
        </div>

        <div id="result-area" class="quiz-card hidden">
            <h3>Résultat</h3>
            <p id="score-text"></p>
            <p style="font-size: 0.8em; color: gray;">Note ce code sur ton cahier : <span id="validation-code"></span></p>
        </div>
    </section>

</div>
<script>
// --- CONFIGURATION ---
const listePseudos = ["Cobra-12", "Eclair-05", "Robot-22", "Lune-09"]; // Vos pseudos
// COLLEZ VOTRE LIEN ICI (Attention à bien garder les guillemets)
const lienBaseForms = "https://docs.google.com/forms/d/e/1FAIpQLSf_X-vICKj2mszRqxCWD9gafLorf-qVy5kv4WGGEFI4gWL29Q/viewform?usp=pp_url&entry.1954381270=NOM_ICI&entry.1875996275=NOTE_ICI
"; 

// --- GESTION DES ONGLETS ---
function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// --- INITIALISATION AU CHARGEMENT ---
window.onload = function() {
    const select = document.createElement('select');
    select.id = "student-pseudo";
    select.style.fontSize = "18px"; // Plus gros pour mobile
    select.style.padding = "10px";
    select.innerHTML = '<option value="">-- Choisis ton pseudo --</option>' + 
        listePseudos.map(p => `<option value="${p}">${p}</option>`).join('');
    
    const authArea = document.getElementById('auth-area');
    authArea.innerHTML = '<h3>Identifie-toi</h3><p>Choisis ton pseudonyme :</p>';
    authArea.appendChild(select);
    authArea.innerHTML += '<br><br><button class="btn-check" onclick="startQuiz()">Accéder au Quiz</button>';
    
    loadQuestions(); // Prépare les questions selon l'URL (?quiz=1)
};

let currentStudent = "";
let scoreFinal = 0;

function loadQuestions() {
    const container = document.getElementById('questions');
    const urlParams = new URLSearchParams(window.location.search);
    const quizId = urlParams.get('quiz') || "1";

    const banqueDeQuizz = {
        "1": {
            titre: "Quiz SVT - Les Cellules",
            questions: [
                { q: "Où se trouve l'ADN ?", a: ["Noyau", "Cytoplasme", "Membrane"], correct: 0 },
                { q: "La cellule végétale a une paroi ?", a: ["Oui", "Non"], correct: 0 },
                { q: "Unité du vivant ?", a: ["Atome", "Cellule", "Organe"], correct: 1 }
            ]
        },
        "2": {
            titre: "Quiz SVT - La Digestion",
            questions: [
                { q: "Où commence la digestion ?", a: ["Estomac", "Bouche", "Intestin"], correct: 1 },
                { q: "Rôle de la salive ?", a: ["Protection", "Digestion chimique", "Rien"], correct: 1 },
                { q: "Longueur intestin grêle ?", a: ["1m", "3m", "6m"], correct: 2 }
            ]
        }
    };

    const quizActuel = banqueDeQuizz[quizId] || banqueDeQuizz["1"];
    document.getElementById('quiz-title').innerText = quizActuel.titre;

    container.innerHTML = quizActuel.questions.map((data, i) => `
        <div style="margin-bottom:20px; text-align:left; border-bottom: 1px solid #eee; padding-bottom: 10px;">
            <p style="font-size:18px;"><strong>${data.q}</strong></p>
            ${data.a.map((ans, idx) => `
                <label style="display:block; margin:15px 0; font-size:17px;"><input type="radio" name="q${i}" value="${idx}" style="transform: scale(1.5); margin-right:10px;"> ${ans}</label>
            `).join('')}
        </div>
    `).join('');
    
    window.currentCorrectAnswers = quizActuel.questions.map(q => q.correct);
}

function startQuiz() {
    currentStudent = document.getElementById('student-pseudo').value;
    if(!currentStudent) {
        alert("Choisis ton pseudo !");
        return;
    }
    document.getElementById('auth-area').classList.add('hidden');
    document.getElementById('quiz-area').classList.remove('hidden');
}

function finishQuiz() {
    let score = 0;
    const bonnesReponses = window.currentCorrectAnswers;
    
    for(let i=0; i<bonnesReponses.length; i++) {
        let res = document.querySelector(`input[name="q${i}"]:checked`);
        if(res && parseInt(res.value) === bonnesReponses[i]) score++;
    }

    document.getElementById('quiz-area').classList.add('hidden');
    document.getElementById('result-area').classList.remove('hidden');
    document.getElementById('score-text').innerHTML = `Bravo <strong>${currentStudent}</strong> !<br>Ton score : <strong>${score} / ${bonnesReponses.length}</strong>`;
    
    // CONSTRUCTION DU LIEN MAGIQUE
    // On remplace NOM_ICI et NOTE_ICI par les vraies valeurs
    let lienFinal = lienBaseForms.replace("NOM_ICI", encodeURIComponent(currentStudent));
    lienFinal = lienFinal.replace("NOTE_ICI", encodeURIComponent(score));

    const btnForms = document.createElement('button');
    btnForms.className = "btn-check";
    btnForms.style.marginTop = "20px";
    btnForms.innerText = "Transmettre ma note au professeur";
    btnForms.onclick = function() { window.location.href = lienFinal; };
    document.getElementById('result-area').appendChild(btnForms);
}

</body>
</html>
